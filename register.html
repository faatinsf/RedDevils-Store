<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - RedDevils Store</title>

  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>

<section class="section" style="min-height:100vh; display:flex; align-items:center;">
  <div class="container" style="max-width:500px;">

    <form id="registerForm" class="card" style="padding:2rem;">

      <div class="section-header" style="margin-bottom:2rem;">
        <span class="section-badge">Authentication</span>
        <h1 class="section-title">REGISTER</h1>
      </div>

      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" id="name" class="form-input" placeholder="Enter your full name" required>
      </div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-input" placeholder="Create a password" required>
      </div>

      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" id="confirmPassword" class="form-input" placeholder="Repeat your password" required>
      </div>

      <button type="submit" class="btn btn-primary w-full">
        Register
      </button>

      <div style="margin-top:1.5rem; text-align:center;">
        <p>Already have an account? <a href="login.html">Login here</a></p>
      </div>

    </form>

  </div>
</section>

<script src="js/main.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
