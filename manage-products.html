<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Products - Admin</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<div class="admin-layout">

  <aside class="admin-sidebar" id="adminSidebar">
    <div class="admin-sidebar-logo">
      <img src="assets/images/logomu.png" alt="MU">
      <span>RED<b>DEVILS</b></span>
    </div>
    <div class="admin-nav-section">
      <div class="admin-nav-label">Main</div>
      <a href="admin-dashboard.html" class="admin-nav-link">
        <span class="nav-icon">📊</span> Dashboard
      </a>
    </div>
    <div class="admin-nav-section">
      <div class="admin-nav-label">Management</div>
      <a href="manage-products.html" class="admin-nav-link active">
        <span class="nav-icon">👕</span> Products
      </a>
      <a href="manage-transactions.html" class="admin-nav-link">
        <span class="nav-icon">🧾</span> Transactions
      </a>
      <a href="manage-users.html" class="admin-nav-link">
        <span class="nav-icon">👥</span> Users
      </a>
      <a href="manage-articles.html" class="admin-nav-link">
        <span class="nav-icon">📝</span> Articles
      </a>
    </div>
    <div class="admin-nav-section">
      <div class="admin-nav-label">Store</div>
      <a href="user-dashboard.html" class="admin-nav-link" target="_blank">
        <span class="nav-icon">🏪</span> View Store
      </a>
    </div>
    <div class="admin-sidebar-footer">
      <button onclick="logout()" class="btn btn-ghost" style="width:100%;justify-content:center;">
        🚪 Logout
      </button>
    </div>
  </aside>

  <main class="admin-main">

    <button id="sidebarToggle"
      style="display:none;background:#1a1a1a;border:1px solid #2a2a2a;color:#fff;
             padding:0.5rem 0.75rem;border-radius:8px;cursor:pointer;margin-bottom:1rem;">☰</button>

    <div class="admin-page-header"
         style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:1rem;">
      <div>
        <div class="eyebrow">ADMIN PANEL</div>
        <h1>MANAGE PRODUCTS</h1>
      </div>
      <button id="btnAddProduct" class="btn btn-primary">+ Add Product</button>
    </div>

    <div class="admin-card">
      <div class="admin-card-header">
        <h3>All Products</h3>
        <div class="admin-toolbar">
          <input type="text" id="searchProduct" class="admin-search" placeholder="🔍 Search product...">
          <select id="filterCategory" class="admin-select">
            <option value="All">All Categories</option>
            <option value="Jersey">Jersey</option>
            <option value="Hoodie">Hoodie</option>
            <option value="Jacket">Jacket</option>
            <option value="Cap">Cap</option>
            <option value="Scarf">Scarf</option>
            <option value="Mug">Mug</option>
            <option value="Accessories">Accessories</option>
            <option value="Shoes">Shoes</option>
          </select>
        </div>
      </div>
      <div class="admin-card-body">
        <table class="admin-table">
          <thead>
            <tr>
              <th>No</th>
              <th>Product</th>
              <th>Price</th>
              <th>Stock</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="productTable"></tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<!-- MODAL ADD/EDIT PRODUCT -->
<div class="admin-modal-overlay" id="productModal">
  <div class="admin-modal">
    <h3 id="modalTitle">Add Product</h3>
    <input type="hidden" id="mProductId">

    <div class="form-group">
      <label class="form-label">Product Name *</label>
      <input type="text" id="mProductName" class="form-input" placeholder="e.g. MU Home Jersey 2026">
    </div>
    <div class="form-group">
      <label class="form-label">Price (IDR) *</label>
      <input type="number" id="mProductPrice" class="form-input" placeholder="e.g. 1250000">
    </div>
    <div class="form-group">
      <label class="form-label">Category</label>
      <select id="mProductCategory" class="form-select">
        <option value="Jersey">Jersey</option>
        <option value="Hoodie">Hoodie</option>
        <option value="Jacket">Jacket</option>
        <option value="Cap">Cap</option>
        <option value="Scarf">Scarf</option>
        <option value="Mug">Mug</option>
        <option value="Accessories">Accessories</option>
        <option value="Shoes">Shoes</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Stock</label>
      <input type="number" id="mProductStock" class="form-input" placeholder="e.g. 50">
    </div>

    <div class="admin-modal-footer">
      <button onclick="closeProductModal()" class="btn btn-ghost">Cancel</button>
      <button onclick="saveProduct()" class="btn btn-primary">Save Product</button>
    </div>
  </div>
</div>

<script src="js/main.js"></script>
<script src="js/admin.js"></script>
<script>
  const toggle  = document.getElementById('sidebarToggle');
  const sidebar = document.getElementById('adminSidebar');
  toggle?.addEventListener('click', () => sidebar.classList.toggle('open'));
  function checkMobile() {
    if (toggle) toggle.style.display = window.innerWidth <= 900 ? 'block' : 'none';
  }
  checkMobile();
  window.addEventListener('resize', checkMobile);

  // tutup modal klik di luar
  document.getElementById('productModal')?.addEventListener('click', function(e) {
    if (e.target === this) closeProductModal();
  });
</script>

</body>
</html>
