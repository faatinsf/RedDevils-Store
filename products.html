<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products - RedDevils Store</title>

  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/pages.css">

  <style>
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 2rem;
    }
    .custom-product-card {
      background: #111;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 1.5rem;
      text-align: center;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .custom-product-card:hover {
      border-color: var(--red);
      transform: translateY(-5px);
    }
    .custom-product-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 1rem;
    }
    .custom-product-card h3 {
      font-size: 1.05rem;
      color: #fff;
      margin-bottom: 0.4rem;
      min-height: 2.4rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .custom-product-card .price {
      color: var(--gold, #FBE122);
      font-weight: bold;
      margin-bottom: 1rem;
    }
    .btn-add-cart {
      background: var(--red, #DA291C);
      color: #fff;
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      width: 100%;
      transition: background 0.2s;
    }
    .btn-add-cart:hover { background: #b61c14; }
    .no-products {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem;
      color: #888;
    }
  </style>
</head>
<body>

<header class="navbar" id="navbar">
  <div class="navbar-inner">

    <a href="user-dashboard.html" class="nav-logo-wrap">
      <img class="mu-logo-nav" src="assets/images/logomu.png" alt="MU" />
      <span class="nav-logo-text">RED<span>DEVILS</span></span>
    </a>

    <nav class="nav-links">
      <a href="user-dashboard.html" class="nav-link">Home</a>
      <a href="products.html" class="nav-link active">Products</a>
      <a href="cart.html" class="nav-link">Cart</a>
      <a href="history.html" class="nav-link">History</a>
    </nav>

    <div class="nav-actions">
      <a href="cart.html" style="position:relative;display:flex;align-items:center;
         padding:0.4rem 0.8rem;color:var(--gray-light);font-size:1.1rem;" title="Cart">
        🛒
        <span class="cart-badge" id="cartBadgeCount"
              style="position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;
                     border-radius:50%;width:16px;height:16px;font-size:0.6rem;font-weight:700;
                     display:flex;align-items:center;justify-content:center;">0</span>
      </a>
      <button class="btn-nav-login" onclick="logout()" style="cursor:pointer;">Logout</button>
      <button class="hamburger" id="hamburger-btn" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>

  </div>
</header>

<div class="mobile-nav" id="mobile-nav">
  <a href="user-dashboard.html" class="nav-link">Home</a>
  <a href="products.html" class="nav-link">Products</a>
  <a href="cart.html" class="nav-link">Cart</a>
  <a href="history.html" class="nav-link">History</a>
</div>

<section class="page-header">
  <div class="breadcrumb">
    <a href="user-dashboard.html">Home</a>
    <span class="breadcrumb-sep">/</span>
    <span>Products</span>
  </div>
  <h1 class="page-title">ALL PRODUCTS</h1>
  <p class="page-subtitle">Premium Manchester United merchandise collection.</p>
</section>

<section class="section">
  <div class="container">
    <div class="products-layout">

      <aside class="filters card-glass">
        <div class="filter-group">
          <label class="form-label">Search Product</label>
          <input type="text" id="searchInput" class="form-input" placeholder="Search merchandise...">
        </div>
        <div class="filter-group">
          <label class="form-label">Category</label>
          <select id="categoryFilter" class="form-select">
            <option value="All">All</option>
            <option value="Jersey">Jersey</option>
            <option value="Hoodie">Hoodie</option>
            <option value="Jacket">Jacket</option>
            <option value="Accessories">Accessories</option>
            <option value="Scarf">Scarf</option>
            <option value="Cap">Cap</option>
            <option value="Mug">Mug</option>
            <option value="Shoes">Shoes</option>
          </select>
        </div>
      </aside>

      <div>
        <div class="products-topbar">
          <h3 id="resultCount">0 products found</h3>
        </div>
        <div class="product-grid" id="productGrid"></div>
      </div>

    </div>
  </div>
</section>

<!-- main.js dulu, baru products.js -->
<script src="js/main.js"></script>
<script src="js/products.js"></script>

</body>
</html>
