<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - RedDevils Store</title>

  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>

<section class="section" style="min-height:100vh; display:flex; align-items:center;">
  <div class="container" style="max-width:500px;">

    <form id="loginForm" class="card" style="padding:2rem;">

      <div class="section-header" style="margin-bottom:2rem;">
        <span class="section-badge">Authentication</span>
        <h1 class="section-title">LOGIN</h1>
      </div>

      <div class="form-group">
        <label class="form-label">Role</label>

        <select id="role" class="form-select">
          <option value="user">User</option>
          <option value="admin">Admin</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-input" required>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-input" required>
      </div>

      <button class="btn btn-primary w-full">
        Login
      </button>

      <div style="margin-top:2rem;">
        <p><strong>User:</strong> user@gmail.com / user123</p>
        <p><strong>Admin:</strong> admin@gmail.com / admin123</p>
      </div>

    </form>

  </div>
</section>

<script src="js/main.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
