<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart - RedDevils Store</title>

  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/pages.css">

  <style>
    .cart-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #111;
      border: 1px solid #222;
      padding: 1rem 1.25rem;
      border-radius: 10px;
      margin-bottom: 1rem;
      gap: 1rem;
      transition: border-color 0.2s;
    }
    .cart-item:hover { border-color: #333; }
    .cart-item-info {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex: 1;
      min-width: 0;
    }
    .cart-item-info img {
      width: 70px;
      height: 70px;
      object-fit: cover;
      border-radius: 8px;
      flex-shrink: 0;
    }
    .cart-item-details h4 {
      margin: 0 0 0.25rem;
      color: #fff;
      font-size: 0.95rem;
    }
    .cart-item-details .price {
      color: var(--gold, #FBE122);
      font-weight: 600;
      font-size: 0.9rem;
    }
    .cart-item-actions {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-shrink: 0;
    }
    .qty-controls {
      display: flex;
      align-items: center;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      overflow: hidden;
    }
    .qty-btn {
      background: none;
      border: none;
      color: #fff;
      padding: 0.4rem 0.75rem;
      cursor: pointer;
      font-weight: 700;
      font-size: 1rem;
      transition: background 0.2s;
    }
    .qty-btn:hover { background: #2a2a2a; }
    .qty-val {
      padding: 0 0.75rem;
      font-weight: 700;
      color: #fff;
      min-width: 24px;
      text-align: center;
    }
    .btn-delete {
      background: none;
      border: none;
      color: #ef4444;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 0.4rem;
      border-radius: 6px;
      transition: background 0.2s;
    }
    .btn-delete:hover { background: rgba(239,68,68,0.1); }
    .empty-cart-message {
      text-align: center;
      padding: 3rem;
      background: #111;
      border: 1px solid #222;
      border-radius: 12px;
    }
    .cart-layout {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 2rem;
      align-items: start;
    }
    .cart-summary {
      position: sticky;
      top: 5rem;
    }
    @media (max-width: 768px) {
      .cart-layout { grid-template-columns: 1fr; }
      .cart-summary { position: static; }
    }
  </style>
</head>
<body>

<header class="navbar" id="navbar">
  <div class="navbar-inner">

    <a href="user-dashboard.html" class="nav-logo-wrap">
      <img class="mu-logo-nav" src="assets/images/logomu.png" alt="MU" />
      <span class="nav-logo-text">RED<span>DEVILS</span></span>
    </a>

    <nav class="nav-links">
      <a href="user-dashboard.html" class="nav-link">Home</a>
      <a href="products.html" class="nav-link">Products</a>
      <a href="cart.html" class="nav-link active">Cart</a>
      <a href="history.html" class="nav-link">History</a>
    </nav>

    <div class="nav-actions">
      <a href="cart.html" style="position:relative;display:flex;align-items:center;
         padding:0.4rem 0.8rem;color:var(--gray-light);font-size:1.1rem;" title="Cart">
        🛒
        <span class="cart-badge" id="cartBadgeCount"
              style="position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;
                     border-radius:50%;width:16px;height:16px;font-size:0.6rem;font-weight:700;
                     display:flex;align-items:center;justify-content:center;">0</span>
      </a>
      <button class="btn-nav-login" onclick="logout()" style="cursor:pointer;">Logout</button>
      <button class="hamburger" id="hamburger-btn" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>

  </div>
</header>

<div class="mobile-nav" id="mobile-nav">
  <a href="user-dashboard.html" class="nav-link">Home</a>
  <a href="products.html" class="nav-link">Products</a>
  <a href="cart.html" class="nav-link">Cart</a>
  <a href="history.html" class="nav-link">History</a>
</div>

<section class="page-header">
  <h1 class="page-title">YOUR CART</h1>
  <p class="page-subtitle">Review your selected products.</p>
</section>

<section class="section">
  <div class="container">
    <div class="cart-layout">

      <!-- kiri: list item -->
      <div id="cartContainer"></div>

      <!-- kanan: summary -->
      <div class="card cart-summary" style="padding:1.75rem;">
        <h3 style="margin-bottom:1.25rem;">Order Summary</h3>

        <div style="display:flex;justify-content:space-between;margin-bottom:0.75rem;">
          <span style="color:#888;">Subtotal</span>
          <span id="subtotal" style="color:#fff;font-weight:600;">Rp 0</span>
        </div>
        <div style="display:flex;justify-content:space-between;margin-bottom:1.25rem;">
          <span style="color:#888;">Ongkir</span>
          <span style="color:#4cd137;font-weight:600;">GRATIS</span>
        </div>

        <div style="border-top:1px solid #222;padding-top:1rem;margin-bottom:1.5rem;
                    display:flex;justify-content:space-between;font-size:1.05rem;font-weight:700;">
          <span style="color:#fff;">Total</span>
          <span id="total" style="color:var(--red);">Rp 0</span>
        </div>

        <a href="checkout.html" class="btn btn-primary"
           style="display:block;text-align:center;width:100%;padding:0.85rem;">
          Proceed Checkout →
        </a>

        <a href="products.html"
           style="display:block;text-align:center;margin-top:0.75rem;color:#888;
                  font-size:0.85rem;text-decoration:none;">
          ← Lanjut Belanja
        </a>
      </div>

    </div>
  </div>
</section>

<script src="js/main.js"></script>
<script src="js/cart.js"></script>

</body>
</html>
